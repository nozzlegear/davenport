name: Release Pipeline
run-name: Publish ${{ inputs.package_version }}

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'New package version'
        type: string
        required: true

permissions: {}

jobs:
  publish:
    name: Publish release package
    runs-on: ubuntu-latest
    environment: 'Release'
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Setup justfile
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
        with:
          tool: just@1.51.0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.DIJON_BOT_APP_ID }}
          private-key: ${{ secrets.DIJON_BOT_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never cache in release builds

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: just set-package-version "$PACKAGE_VERSION"

      - name: Build
        run: just build

      - name: Test
        run: just test

      - name: Commit and push version bump (signed)
        id: bump
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: 'Bump version to ${{ inputs.package_version }}'
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          file_pattern: 'package.json package-lock.json'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Publish to NPM
        run: just publish-to-npm

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: davenport
          subject-path: 'dist/**/*'

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          COMMIT_SHA: ${{ steps.bump.outputs.commit-hash }}
        run: |
          gh release create "v${PACKAGE_VERSION}" \
            --target "${COMMIT_SHA}" \
            --title "v${PACKAGE_VERSION}" \
            --generate-notes \
            --draft
