name: Release Pipeline
run-name: Publish ${{ inputs.skip_version_bump && '(current version)' || inputs.package_version }}

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'New package version (required unless skipping version bump)'
        type: string
        required: false
      platform:
        description: 'Platform(s) to publish to'
        type: choice
        options:
          - both
          - npm
          - github
        default: 'both'
        required: true
      skip_version_bump:
        description: 'Skip bumping the version and skip creating a GitHub release (uses version already in package.json)'
        type: boolean
        default: false

permissions: {}

jobs:
  publish:
    name: Publish release package
    runs-on: ubuntu-latest
    environment: 'Release'
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write

    steps:
      - name: Setup justfile
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
        with:
          tool: just@1.51.0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.DIJON_BOT_APP_ID }}
          private-key: ${{ secrets.DIJON_BOT_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false # never cache in release builds

      - name: Install dependencies
        run: npm ci

      - name: Validate inputs
        if: ${{ !inputs.skip_version_bump && !inputs.package_version }}
        run: |
          echo "::error::package_version is required when skip_version_bump is false."
          exit 1

      - name: Set package version
        if: ${{ !inputs.skip_version_bump }}
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: just set-package-version "$PACKAGE_VERSION"

      - name: Build
        run: just build

      - name: Commit package version change
        if: ${{ !inputs.skip_version_bump }}
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: 'package.json package-lock.json'
          commit: --signoff
          message: 'Bump version to ${{ inputs.package_version }}'
          pathspec_error_handling: exitAtEnd
          default_author: github_actions
          author_name: 'Dijon Bot'
          author_email: '${{ vars.DIJON_BOT_USER_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          push: true
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Test
        run: just test

      - name: Commit and push version bump (signed)
        id: bump
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: 'Bump version to ${{ inputs.package_version }}'
          repo: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          file_pattern: 'package.json package-lock.json'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Publish to NPM
        if: ${{ inputs.platform == 'both' || inputs.platform == 'npm' }}
        run: just publish-package npm

      # Reconfigures .npmrc with auth for the GitHub Packages registry so that
      # NODE_AUTH_TOKEN is picked up when publishing in the next step.
      - name: Setup Node.js for GitHub Packages
        if: ${{ inputs.platform == 'both' || inputs.platform == 'github' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: 'https://npm.pkg.github.com'
          scope: '@nozzlegear'

      - name: Publish to GitHub Packages
        if: ${{ inputs.platform == 'both' || inputs.platform == 'github' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just publish-package github

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: davenport
          subject-path: 'dist/**/*'

      - name: Create GitHub release
        if: ${{ !inputs.skip_version_bump }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          COMMIT_SHA: ${{ steps.bump.outputs.commit-hash }}
        run: |
          gh release create "v${PACKAGE_VERSION}" \
            --target "${COMMIT_SHA}" \
            --title "v${PACKAGE_VERSION}" \
            --generate-notes \
            --draft
