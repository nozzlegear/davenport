name: Release Pipeline
run-name: Publish ${{ inputs.package_version }}

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'New package version'
        type: string
        required: true

permissions: {}

jobs:
  publish:
    name: Publish release package
    runs-on: ubuntu-latest
    environment: 'Release'
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Setup justfile
        uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: just@1.51.0

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.DIJON_BOT_APP_ID }}
          private-key: ${{ secrets.DIJON_BOT_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: just set-package-version "$PACKAGE_VERSION"

      - name: Build
        run: just build

      - name: Commit package version change
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          add: 'package.json package-lock.json'
          commit: --signoff
          message: 'Bump version to ${{ inputs.package_version }}'
          pathspec_error_handling: exitAtEnd
          default_author: github_actions
          author_name: 'Dijon Bot'
          author_email: '${{ vars.DIJON_BOT_USER_ID }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          push: true
          github_token: ${{ steps.app-token.outputs.token }}

      - name: Publish to NPM
        run: just publish-to-npm

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: davenport
          subject-path: 'index.ts' # This should ideally point to the dist folder or the root index.ts if we don't pack manually

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          gh release create "v${PACKAGE_VERSION}" \
            --title "v${PACKAGE_VERSION}" \
            --generate-notes \
            --draft
